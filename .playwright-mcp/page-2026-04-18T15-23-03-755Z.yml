              - tabpanel "README" [ref=e250]:
                - heading "@sylphx/vex" [level=2] [ref=e251]
                - blockquote [ref=e252]:
                  - paragraph [ref=e253]: ⚡ Ultra-fast schema validation - 12x faster than Zod, 6x faster than Valibot
                - heading "Installation" [level=2] [ref=e254]
                - code [ref=e256]: "npm install @sylphx/vex # or bun add @sylphx/vex # or pnpm add @sylphx/vex"
                - heading "Basic Usage" [level=2] [ref=e257]
                - code [ref=e259]: "import { str, num, object, array, email, int, positive, min, max, safeParse } from '@sylphx/vex' // Create a schema const userSchema = object({ name: str(min(1), max(100)), email: str(email), age: num(int, positive), }) // Validate data (throws on error) const user = userSchema({ name: 'Alice', email: 'alice@example.com', age: 30 }) // Or use safeParse (returns result object) const result = safeParse(userSchema)({ name: 'Bob', email: 'invalid', age: -1 }) if (result.success) { console.log(result.data) } else { console.log(result.error) // \"email: Invalid email\" }"
                - heading "Core Concepts" [level=2] [ref=e260]
                - heading "1. Type Validators" [level=3] [ref=e261]
                - paragraph [ref=e262]: "Vex provides composable type validators:"
                - code [ref=e264]: "import { str, num, bool, arr, obj } from '@sylphx/vex' // Base validators (no constraints) str()('hello') // ✅ 'hello' str()(123) // ❌ throws \"Expected string\" num()(42) // ✅ 42 num()('42') // ❌ throws \"Expected number\" bool()(true) // ✅ true"
                - heading "2. Adding Constraints" [level=3] [ref=e265]
                - paragraph [ref=e266]: "Pass constraints directly to type validators:"
                - code [ref=e268]: "import { str, num, email, url, int, positive, min, max, gte, lte } from '@sylphx/vex' // String with constraints str(email) // string + email format str(url) // string + URL format str(min(3), max(20)) // string + length between 3-20 // Number with constraints num(int) // integer num(positive) // positive number num(int, positive) // positive integer num(gte(0), lte(100)) // number between 0-100 // Usage str(email)('test@example.com') // ✅ 'test@example.com' str(email)('invalid') // ❌ throws \"Invalid email\" num(int, positive)(25) // ✅ 25 num(int, positive)(-5) // ❌ throws \"Must be positive\""
                - heading "3. Object Schemas" [level=3] [ref=e269]
                - code [ref=e271]: "import { object, str, num, email, int, positive, optional, min } from '@sylphx/vex' const userSchema = object({ id: str(), name: str(min(1)), email: str(email), age: num(int, positive), bio: optional(str()), // optional field }) // TypeScript infers the type automatically type User = ReturnType<typeof userSchema> // { id: string; name: string; email: string; age: number; bio?: string } const user = userSchema({ id: '123', name: 'Alice', email: 'alice@example.com', age: 30, })"
                - heading "4. Array Schemas" [level=3] [ref=e272]
                - code [ref=e274]: "import { array, str, num, email, int, nonempty } from '@sylphx/vex' const emailsSchema = array(str(email)) const scoresSchema = array(num(int)) const tagsSchema = array(str(nonempty)) emailsSchema(['a@b.com', 'c@d.com']) // ✅ scoresSchema([1, 2, 3]) // ✅ tagsSchema(['a', '', 'c']) // ❌ throws \"[1]: Required\""
                - heading "5. Error Handling" [level=3] [ref=e275]
                - paragraph [ref=e276]: "Three ways to handle validation errors:"
                - code [ref=e278]: "import { str, email, safeParse, tryParse, ValidationError } from '@sylphx/vex' const schema = str(email) // Method 1: Direct call (throws on error) try { schema('invalid') } catch (e) { if (e instanceof ValidationError) { console.log(e.message) // \"Invalid email\" } } // Method 2: safeParse (returns result object) const result = safeParse(schema)('invalid') if (!result.success) { console.log(result.error) // \"Invalid email\" } // Method 3: tryParse (returns null on error) const value = tryParse(schema)('invalid') // null"
                - heading "Common Patterns" [level=2] [ref=e279]
                - heading "Form Validation" [level=3] [ref=e280]
                - code [ref=e282]:
                  - text: "import { object, str, num, email, min, max, int, positive, safeParse } from '@sylphx/vex' const signupSchema = object({ username: str(min(3), max(20)), email: str(email), password: str(min(8)), age: num(int, positive), }) function handleSubmit("
                  - generic [ref=e283]: "formData: unknown"
                  - text: ") { const result = safeParse(signupSchema)(formData) if (!result.success) { return { error: result.error } } // result.data is fully typed return { user: result.data } }"
                - heading "API Response Validation" [level=3] [ref=e284]
                - code [ref=e286]:
                  - text: "import { object, array, str, num, bool, int, positive } from '@sylphx/vex' const apiResponseSchema = object({ status: str(), data: array(object({ id: num(int, positive), title: str(), completed: bool(), })), }) async function fetchTodos("
                  - text: ") { const response = await fetch('/api/todos') const json = await response.json() // Throws if response doesn't match schema return apiResponseSchema(json) }"
                - heading "Optional & Nullable" [level=3] [ref=e287]
                - code [ref=e289]: "import { str, email, optional, nullable, nullish, withDefault } from '@sylphx/vex' // optional - allows undefined const optionalEmail = optional(str(email)) optionalEmail(undefined) // ✅ undefined optionalEmail('test@example.com') // ✅ 'test@example.com' // nullable - allows null const nullableEmail = nullable(str(email)) nullableEmail(null) // ✅ null // nullish - allows null or undefined const nullishEmail = nullish(str(email)) // withDefault - provides default value const emailWithDefault = withDefault(str(email), 'default@example.com') emailWithDefault(undefined) // ✅ 'default@example.com'"
                - heading "Union Types" [level=3] [ref=e290]
                - code [ref=e292]: "import { union, str, num, literal } from '@sylphx/vex' // Union of types (variadic syntax) const stringOrNumber = union(str(), num()) stringOrNumber('hello') // ✅ 'hello' stringOrNumber(42) // ✅ 42 stringOrNumber(true) // ❌ throws // Literal union (discriminated) const status = union(literal('pending'), literal('active'), literal('done')) status('active') // ✅ 'active' status('invalid') // ❌ throws"
                - heading "Transforms" [level=3] [ref=e293]
                - code [ref=e295]: "import { str, num, trim, lower, upper, toInt, toFloat, toDate, pipe } from '@sylphx/vex' // String transforms (use pipe for transforms) const normalizedEmail = pipe(str(), trim, lower) normalizedEmail(' ALICE@EXAMPLE.COM ') // 'alice@example.com' // Parse string to number const parseAge = pipe(str(), toInt) parseAge('42') // 42 // Parse string to Date const parseDate = pipe(str(), toDate) parseDate('2024-01-15') // Date object"
