              - tabpanel "README" [ref=e284]:
                - heading "minimatch" [level=2] [ref=e285]
                - paragraph [ref=e286]: A minimal matching utility.
                - paragraph [ref=e287]: This is the matching library used internally by npm.
                - paragraph [ref=e288]:
                  - text: It works by converting glob expressions into JavaScript
                  - code [ref=e289]: RegExp
                  - text: objects.
                - heading "Important Security Consideration!" [level=2] [ref=e290]
                - blockquote [ref=e291]:
                  - paragraph [ref=e292]:
                    - text: "[!WARNING]"
                    - text: This library uses JavaScript regular expressions. Please read the following warning carefully, and be thoughtful about what you provide to this library in production systems.
                - paragraph [ref=e293]:
                  - emphasis [ref=e294]: Any
                  - text: library in JavaScript that deals with matching string patterns using regular expressions will be subject to
                  - link "ReDoS" [ref=e295] [cursor=pointer]:
                    - /url: https://owasp.org/www-community/attacks/Regular_expression_Denial_of_Service_-_ReDoS
                  - text: if the pattern is generated using untrusted input.
                - paragraph [ref=e296]:
                  - text: Efforts have been made to mitigate risk as much as is feasible in such a library, providing maximum recursion depths and so forth, but these measures can only ultimately protect against accidents, not malice. A dedicated attacker can
                  - emphasis [ref=e297]: always
                  - text: find patterns that cannot be defended against by a bash-compatible glob pattern matching system that uses JavaScript regular expressions.
                - paragraph [ref=e298]: "To be extremely clear:"
                - blockquote [ref=e299]:
                  - paragraph [ref=e300]:
                    - text: "[!WARNING]"
                    - strong [ref=e301]: If you create a system where you take user input, and use that input as the source of a Regular Expression pattern, in this or any extant glob matcher in JavaScript, you will be pwned.
                - paragraph [ref=e302]:
                  - text: A future version of this library
                  - emphasis [ref=e303]: may
                  - text: use a different matching algorithm which does not exhibit backtracking problems. If and when that happens, it will likely be a sweeping change, and those improvements will
                  - strong [ref=e304]: not
                  - text: be backported to legacy versions.
                - paragraph [ref=e305]: In the near term, it is not reasonable to continue to play whack-a-mole with security advisories, and so any future ReDoS reports will be considered "working as intended", and resolved entirely by this warning.
                - heading "Usage" [level=2] [ref=e306]
                - code [ref=e308]: "// hybrid module, load with require() or import import { minimatch } from 'minimatch' // or: const { minimatch } = require('minimatch') minimatch('bar.foo', '*.foo') // true! minimatch('bar.foo', '*.bar') // false! minimatch('bar.foo', '*.+(bar|foo)', { debug: true }) // true, and noisy!"
                - heading "Features" [level=2] [ref=e309]
                - paragraph [ref=e310]: "Supports these glob features:"
                - list [ref=e311]:
                  - listitem [ref=e312]: Brace Expansion
                  - listitem [ref=e313]: Extended glob matching
                  - listitem [ref=e314]:
                    - text: "\"Globstar\""
                    - code [ref=e315]: "**"
                    - text: matching
                  - listitem [ref=e316]:
                    - link "Posix character classes" [ref=e317] [cursor=pointer]:
                      - /url: https://www.gnu.org/software/bash/manual/html_node/Pattern-Matching.html
                    - text: ", like"
                    - code [ref=e318]: "[[:alpha:]]"
                    - text: ", supporting the full range of Unicode characters. For example,"
                    - code [ref=e319]: "[[:alpha:]]"
                    - text: will match against
                    - code [ref=e320]: "'é'"
                    - text: ", though"
                    - code [ref=e321]: "[a-zA-Z]"
                    - text: will not. Collating symbol and set matching is not supported, so
                    - code [ref=e322]: "[[=e=]]"
                    - text: will
                    - emphasis [ref=e323]: not
                    - text: match
                    - code [ref=e324]: "'é'"
                    - text: and
                    - code [ref=e325]: "[[.ch.]]"
                    - text: will not match
                    - code [ref=e326]: "'ch'"
                    - text: in locales where
                    - code [ref=e327]: ch
                    - text: is considered a single character.
                - paragraph [ref=e328]: "See:"
                - list [ref=e329]:
                  - listitem [ref=e330]:
                    - code [ref=e331]: man sh
                  - listitem [ref=e332]:
                    - code [ref=e333]: man bash
                    - link "Pattern Matching" [ref=e334] [cursor=pointer]:
                      - /url: https://www.gnu.org/software/bash/manual/html_node/Pattern-Matching.html
                  - listitem [ref=e335]:
                    - code [ref=e336]: man 3 fnmatch
                  - listitem [ref=e337]:
                    - code [ref=e338]: man 5 gitignore
                - heading "Windows" [level=2] [ref=e339]
                - paragraph [ref=e340]:
                  - strong [ref=e341]: Please only use forward-slashes in glob expressions.
                - paragraph [ref=e342]:
                  - text: Though windows uses either
                  - code [ref=e343]: /
                  - text: or
                  - code [ref=e344]: \
                  - text: as its path separator, only
                  - code [ref=e345]: /
                  - text: characters are used by this glob implementation. You must use forward-slashes
                  - strong [ref=e346]: only
                  - text: in glob expressions. Back-slashes in patterns will always be interpreted as escape characters, not path separators.
                - paragraph [ref=e347]:
                  - text: Note that
                  - code [ref=e348]: \
                  - text: or
                  - code [ref=e349]: /
                  - emphasis [ref=e350]: will
                  - text: be interpreted as path separators in paths on Windows, and will match against
                  - code [ref=e351]: /
                  - text: in glob expressions.
                - paragraph [ref=e352]:
                  - text: So just always use
                  - code [ref=e353]: /
                  - text: in patterns.
                - heading "UNC Paths" [level=3] [ref=e354]
                - paragraph [ref=e355]:
                  - text: On Windows, UNC paths like
                  - code [ref=e356]: //?/c:/...
                  - text: or
                  - code [ref=e357]: //ComputerName/Share/...
                  - text: are handled specially.
                - list [ref=e358]:
                  - listitem [ref=e359]:
                    - text: Patterns starting with a double-slash followed by some non-slash characters will preserve their double-slash. As a result, a pattern like
                    - code [ref=e360]: //*
                    - text: will match
                    - code [ref=e361]: //x
                    - text: ", but not"
                    - code [ref=e362]: /x
                    - text: .
                  - listitem [ref=e363]:
                    - text: Patterns staring with
                    - code [ref=e364]: "//?/<drive letter>:"
                    - text: will
                    - emphasis [ref=e365]: not
                    - text: treat the
                    - code [ref=e366]: "?"
                    - text: as a wildcard character. Instead, it will be treated as a normal string.
                  - listitem [ref=e367]:
                    - text: Patterns starting with
                    - code [ref=e368]: //?/<drive letter>:/...
                    - text: will match file paths starting with
                    - code [ref=e369]: <drive letter>:/...
                    - text: ", and vice versa, as if the"
                    - code [ref=e370]: //?/
                    - text: was not present. This behavior only is present when the drive letters are a case-insensitive match to one another. The remaining portions of the path/pattern are compared case sensitively, unless
                    - code [ref=e371]: nocase:true
                    - text: is set.
                - paragraph [ref=e372]:
                  - text: Note that specifying a UNC path using
                  - code [ref=e373]: \
                  - text: characters as path separators is always allowed in the file path argument, but only allowed in the pattern argument when
                  - code [ref=e374]: "windowsPathsNoEscape: true"
                  - text: is set in the options.
                - heading "Minimatch Class" [level=2] [ref=e375]
                - paragraph [ref=e376]:
                  - text: Create a minimatch object by instantiating the
                  - code [ref=e377]: minimatch.Minimatch
                  - text: class.
                - code [ref=e379]: var Minimatch = require('minimatch').Minimatch var mm = new Minimatch(pattern, options)
                - heading "Properties" [level=3] [ref=e380]
                - list [ref=e381]:
                  - listitem [ref=e382]:
                    - paragraph [ref=e383]:
                      - code [ref=e384]: pattern
                      - text: The original pattern the minimatch object represents.
                  - listitem [ref=e385]:
                    - paragraph [ref=e386]:
                      - code [ref=e387]: options
                      - text: The options supplied to the constructor.
                  - listitem [ref=e388]:
                    - paragraph [ref=e389]:
                      - code [ref=e390]: set
                      - text: A 2-dimensional array of regexp or string expressions. Each row in the array corresponds to a brace-expanded pattern. Each item in the row corresponds to a single path-part. For example, the pattern
                      - code [ref=e391]: "{a,b/c}/d"
                      - text: "would expand to a set of patterns like:"
                    - code [ref=e393]: "[ [ a, d ] , [ b, c, d ] ]"
                    - paragraph [ref=e394]:
                      - text: If a portion of the pattern doesn't have any "magic" in it (that is, it's something like
                      - code [ref=e395]: "\"foo\""
                      - text: rather than
                      - code [ref=e396]: fo*o?
                      - text: ), then it will be left as a string rather than converted to a regular expression.
                  - listitem [ref=e397]:
                    - paragraph [ref=e398]:
                      - code [ref=e399]: regexp
                      - text: Created by the
                      - code [ref=e400]: makeRe
                      - text: method. A single regular expression expressing the entire pattern. This is useful in cases where you wish to use the pattern somewhat like
                      - code [ref=e401]: fnmatch(3)
                      - text: with
                      - code [ref=e402]: FNM_PATH
                      - text: enabled.
                  - listitem [ref=e403]:
                    - paragraph [ref=e404]:
                      - code [ref=e405]: negate
                      - text: True if the pattern is negated.
                  - listitem [ref=e406]:
                    - paragraph [ref=e407]:
                      - code [ref=e408]: comment
                      - text: True if the pattern is a comment.
                  - listitem [ref=e409]:
                    - paragraph [ref=e410]:
                      - code [ref=e411]: empty
                      - text: True if the pattern is
                      - code [ref=e412]: "\"\""
                      - text: .
                - heading "Methods" [level=3] [ref=e413]
                - list [ref=e414]:
                  - listitem [ref=e415]:
                    - paragraph [ref=e416]:
                      - code [ref=e417]: makeRe()
                      - text: Generate the
                      - code [ref=e418]: regexp
                      - text: member if necessary, and return it. Will return
                      - code [ref=e419]: "false"
                      - text: if the pattern is invalid.
                  - listitem [ref=e420]:
                    - paragraph [ref=e421]:
                      - code [ref=e422]: match(fname)
