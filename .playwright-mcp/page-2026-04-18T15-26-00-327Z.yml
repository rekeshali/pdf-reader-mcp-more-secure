                - heading "minimatch.match(list, pattern, options)" [level=3] [ref=e476]
                - paragraph [ref=e477]: Match against the list of files, in the style of fnmatch or glob. If nothing is matched, and options.nonull is set, then return a list containing the pattern itself.
                - code [ref=e479]: "var javascripts = minimatch.match(fileList, '*.js', { matchBase: true })"
