                - heading "Options" [level=2] [ref=e482]
                - paragraph [ref=e483]:
                  - text: All options are
                  - code [ref=e484]: "false"
                  - text: by default.
                - heading "debug" [level=3] [ref=e485]
                - paragraph [ref=e486]: Dump a ton of stuff to stderr.
                - heading "nobrace" [level=3] [ref=e487]
                - paragraph [ref=e488]:
                  - text: Do not expand
                  - code [ref=e489]: "{a,b}"
                  - text: and
                  - code [ref=e490]: "{1..3}"
                  - text: brace sets.
                - heading "noglobstar" [level=3] [ref=e491]
                - paragraph [ref=e492]:
                  - text: Disable
                  - code [ref=e493]: "**"
                  - text: matching against multiple folder names.
                - heading "dot" [level=3] [ref=e494]
                - paragraph [ref=e495]: Allow patterns to match filenames starting with a period, even if the pattern does not explicitly have a period in that spot.
                - paragraph [ref=e496]:
                  - text: Note that by default,
                  - code [ref=e497]: a/**/b
                  - text: will
                  - strong [ref=e498]: not
                  - text: match
                  - code [ref=e499]: a/.d/b
                  - text: ", unless"
                  - code [ref=e500]: dot
                  - text: is set.
                - heading "noext" [level=3] [ref=e501]
                - paragraph [ref=e502]:
                  - text: Disable "extglob" style patterns like
                  - code [ref=e503]: +(a|b)
                  - text: .
                - heading "nocase" [level=3] [ref=e504]
                - paragraph [ref=e505]: Perform a case-insensitive match.
                - heading "nocaseMagicOnly" [level=3] [ref=e506]
                - paragraph [ref=e507]:
                  - text: When used with
                  - code [ref=e508]: "{nocase: true}"
                  - text: ", create regular expressions that are case-insensitive, but leave string match portions untouched. Has no effect when used without"
                  - code [ref=e509]: "{nocase: true}"
                  - text: .
                - paragraph [ref=e510]: Useful when some other form of case-insensitive matching is used, or if the original string representation is useful in some other way.
                - heading "nonull" [level=3] [ref=e511]
                - paragraph [ref=e512]:
                  - text: When a match is not found by
                  - code [ref=e513]: minimatch.match
                  - text: ", return a list containing the pattern itself if this option is set. When not set, an empty list is returned if there are no matches."
                - heading "magicalBraces" [level=3] [ref=e514]
                - paragraph [ref=e515]:
                  - text: This only affects the results of the
                  - code [ref=e516]: Minimatch.hasMagic
                  - text: method.
                - paragraph [ref=e517]:
                  - text: If the pattern contains brace expansions, such as
                  - code [ref=e518]: "a{b,c}d"
                  - text: ", but no other magic characters, then the"
                  - code [ref=e519]: Minimatch.hasMagic()
                  - text: method will return
                  - code [ref=e520]: "false"
                  - text: by default. When this option set, it will return
                  - code [ref=e521]: "true"
                  - text: for brace expansion as well as other magic glob characters.
                - heading "matchBase" [level=3] [ref=e522]
                - paragraph [ref=e523]:
                  - text: If set, then patterns without slashes will be matched against the basename of the path if it contains slashes. For example,
                  - code [ref=e524]: a?b
                  - text: would match the path
                  - code [ref=e525]: /xyz/123/acb
                  - text: ", but not"
                  - code [ref=e526]: /xyz/acb/123
                  - text: .
                - heading "nocomment" [level=3] [ref=e527]
                - paragraph [ref=e528]:
                  - text: Suppress the behavior of treating
                  - code [ref=e529]: "#"
                  - text: at the start of a pattern as a comment.
                - heading "nonegate" [level=3] [ref=e530]
                - paragraph [ref=e531]:
                  - text: Suppress the behavior of treating a leading
                  - code [ref=e532]: "!"
                  - text: character as negation.
                - heading "flipNegate" [level=3] [ref=e533]
                - paragraph [ref=e534]: Returns from negate expressions the same as if they were not negated. (Ie, true on a hit, false on a miss.)
                - heading "partial" [level=3] [ref=e535]
                - paragraph [ref=e536]: Compare a partial path to a pattern. As long as the parts of the path that are present are not contradicted by the pattern, it will be treated as a match. This is useful in applications where you're walking through a folder structure, and don't yet have the full path, but want to ensure that you do not walk down paths that can never be a match.
                - paragraph [ref=e537]: For example,
                - code [ref=e539]: "minimatch('/a/b', '/a/*/c/d', { partial: true }) // true, might be /a/b/c/d minimatch('/a/b', '/**/d', { partial: true }) // true, might be /a/b/.../d minimatch('/x/y/z', '/a/**/z', { partial: true }) // false, because x !== a"
                - heading "windowsPathsNoEscape" [level=3] [ref=e540]
                - paragraph [ref=e541]:
                  - text: Use
                  - code [ref=e542]: \\
                  - text: as a path separator
                  - emphasis [ref=e543]: only
                  - text: ", and"
                  - emphasis [ref=e544]: never
                  - text: as an escape character. If set, all
                  - code [ref=e545]: \\
                  - text: characters are replaced with
                  - code [ref=e546]: /
                  - text: in the pattern. Note that this makes it
                  - strong [ref=e547]: impossible
                  - text: to match against paths containing literal glob pattern characters, but allows matching with patterns constructed using
                  - code [ref=e548]: path.join()
                  - text: and
                  - code [ref=e549]: path.resolve()
                  - text: on Windows platforms, mimicking the (buggy!) behavior of earlier versions on Windows. Please use with caution, and be mindful of
                  - link "the caveat about Windows paths" [ref=e550] [cursor=pointer]:
                    - /url: /npm/package/minimatch#windows
                  - text: .
                - paragraph [ref=e551]:
                  - text: For legacy reasons, this is also set if
                  - code [ref=e552]: options.allowWindowsEscape
                  - text: is set to the exact value
                  - code [ref=e553]: "false"
                  - text: .
                - heading "windowsNoMagicRoot" [level=3] [ref=e554]
                - paragraph [ref=e555]:
                  - text: When a pattern starts with a UNC path or drive letter, and in
                  - code [ref=e556]: nocase:true
                  - text: mode, do not convert the root portions of the pattern into a case-insensitive regular expression, and instead leave them as strings.
                - paragraph [ref=e557]:
                  - text: This is the default when the platform is
                  - code [ref=e558]: win32
                  - text: and
                  - code [ref=e559]: nocase:true
                  - text: is set.
                - heading "preserveMultipleSlashes" [level=3] [ref=e560]
                - paragraph [ref=e561]:
                  - text: By default, multiple
                  - code [ref=e562]: /
                  - text: characters (other than the leading
                  - code [ref=e563]: //
                  - text: in a UNC path, see "UNC Paths" above) are treated as a single
                  - code [ref=e564]: /
                  - text: .
                - paragraph [ref=e565]:
                  - text: That is, a pattern like
                  - code [ref=e566]: a///b
                  - text: will match the file path
                  - code [ref=e567]: a/b
                  - text: .
                - paragraph [ref=e568]:
                  - text: Set
                  - code [ref=e569]: "preserveMultipleSlashes: true"
                  - text: to suppress this behavior.
                - heading "optimizationLevel" [level=3] [ref=e570]
                - paragraph [ref=e571]: A number indicating the level of optimization that should be done to the pattern prior to parsing and using it for matches.
                - paragraph [ref=e572]:
                  - text: Globstar parts
                  - code [ref=e573]: "**"
                  - text: are always converted to
                  - code [ref=e574]: "*"
                  - text: when
                  - code [ref=e575]: noglobstar
                  - text: is set, and multiple adjacent
                  - code [ref=e576]: "**"
                  - text: parts are converted into a single
                  - code [ref=e577]: "**"
                  - text: (ie,
                  - code [ref=e578]: a/**/**/b
                  - text: will be treated as
                  - code [ref=e579]: a/**/b
                  - text: ", as this is equivalent in all cases)."
                - list [ref=e580]:
                  - listitem [ref=e581]:
                    - paragraph [ref=e582]:
                      - code [ref=e583]: "0"
                      - text: "- Make no further changes. In this mode,"
                      - code [ref=e584]: .
                      - text: and
                      - code [ref=e585]: ..
                      - text: are maintained in the pattern, meaning that they must also appear in the same position in the test path string. Eg, a pattern like
                      - code [ref=e586]: a/*/../c
                      - text: will match the string
                      - code [ref=e587]: a/b/../c
                      - text: but not the string
                      - code [ref=e588]: a/c
                      - text: .
                  - listitem [ref=e589]:
                    - paragraph [ref=e590]:
                      - code [ref=e591]: "1"
                      - text: "- (default) Remove cases where a double-dot"
                      - code [ref=e592]: ..
                      - text: follows a pattern portion that is not
                      - code [ref=e593]: "**"
                      - text: ","
                      - code [ref=e594]: .
                      - text: ","
                      - code [ref=e595]: ..
                      - text: ", or empty"
                      - code [ref=e596]: "''"
                      - text: . For example, the pattern
                      - code [ref=e597]: ./a/b/../*
                      - text: is converted to
                      - code [ref=e598]: ./a/*
                      - text: ", and so it will match the path string"
                      - code [ref=e599]: ./a/c
                      - text: ", but not the path string"
                      - code [ref=e600]: ./a/b/../c
                      - text: . Dots and empty path portions in the pattern are preserved.
                  - listitem [ref=e601]:
                    - paragraph [ref=e602]:
                      - code [ref=e603]: "2"
                      - text: "(or higher) - Much more aggressive optimizations, suitable for use with file-walking cases:"
                    - list [ref=e604]:
                      - listitem [ref=e605]:
                        - text: Remove cases where a double-dot
                        - code [ref=e606]: ..
                        - text: follows a pattern portion that is not
                        - code [ref=e607]: "**"
                        - text: ","
                        - code [ref=e608]: .
                        - text: ", or empty"
                        - code [ref=e609]: "''"
                        - text: . Remove empty and
                        - code [ref=e610]: .
                        - text: portions of the pattern, where safe to do so (ie, anywhere other than the last position, the first position, or the second position in a pattern starting with
                        - code [ref=e611]: /
                        - text: ", as this may indicate a UNC path on Windows)."
                      - listitem [ref=e612]:
                        - text: Convert patterns containing
                        - code [ref=e613]: <pre>/**/../<p>/<rest>
                        - text: into the equivalent
                        - code [ref=e614]: "<pre>/{..,**}/<p>/<rest>"
                        - text: ", where"
                        - code [ref=e615]: <p>
                        - text: is a a pattern portion other than
                        - code [ref=e616]: .
                        - text: ","
                        - code [ref=e617]: ..
                        - text: ","
                        - code [ref=e618]: "**"
                        - text: ", or empty"
                        - code [ref=e619]: "''"
                        - text: .
                      - listitem [ref=e620]:
                        - text: Dedupe patterns where a
                        - code [ref=e621]: "**"
                        - text: portion is present in one and omitted in another, and it is not the final path portion, and they are otherwise equivalent. So
                        - code [ref=e622]: "{a/**/b,a/b}"
                        - text: becomes
                        - code [ref=e623]: a/**/b
                        - text: ", because"
                        - code [ref=e624]: "**"
                        - text: matches against an empty path portion.
                      - listitem [ref=e625]:
                        - text: Dedupe patterns where a
                        - code [ref=e626]: "*"
                        - text: portion is present in one, and a non-dot pattern other than
                        - code [ref=e627]: "**"
                        - text: ","
                        - code [ref=e628]: .
                        - text: ","
                        - code [ref=e629]: ..
                        - text: ", or"
                        - code [ref=e630]: "''"
                        - text: is in the same position in the other. So
                        - code [ref=e631]: "a/{*,x}/b"
                        - text: becomes
                        - code [ref=e632]: a/*/b
                        - text: ", because"
                        - code [ref=e633]: "*"
                        - text: can match against
                        - code [ref=e634]: x
                        - text: .
                    - paragraph [ref=e635]:
                      - text: While these optimizations improve the performance of file-walking use cases such as
                      - link "glob" [ref=e636] [cursor=pointer]:
                        - /url: http://npm.im/glob
                      - text: (ie, the reason this module exists), there are cases where it will fail to match a literal string that would have been matched in optimization level 1 or 0.
                    - paragraph [ref=e637]:
                      - text: Specifically, while the
                      - code [ref=e638]: Minimatch.match()
                      - text: method will optimize the file path string in the same ways, resulting in the same matches, it will fail when tested with the regular expression provided by
                      - code [ref=e639]: Minimatch.makeRe()
                      - text: ", unless the path string is first processed with"
                      - code [ref=e640]: minimatch.levelTwoFileOptimize()
                      - text: or similar.
                - heading "platform" [level=3] [ref=e641]
                - paragraph [ref=e642]:
                  - text: When set to
                  - code [ref=e643]: win32
                  - text: ", this will trigger all windows-specific behaviors (special handling for UNC paths, and treating"
                  - code [ref=e644]: \
                  - text: as separators in file paths for comparison.)
                - paragraph [ref=e645]:
                  - text: Defaults to the value of
                  - code [ref=e646]: process.platform
                  - text: .
                - heading "maxGlobstarRecursion" [level=3] [ref=e647]
                - paragraph [ref=e648]:
                  - text: Max number of non-adjacent
                  - code [ref=e649]: "**"
                  - text: patterns to recursively walk down.
                - paragraph [ref=e650]:
                  - text: The default of
                  - code [ref=e651]: "200"
                  - text: is almost certainly high enough for most purposes, and can handle absurdly excessive patterns.
                - paragraph [ref=e652]:
                  - text: If the limit is exceeded (which would require very excessively long patterns and paths containing lots of
                  - code [ref=e653]: "**"
                  - text: patterns!), then it is treated as non-matching, even if the path would normally match the pattern provided.
                - paragraph [ref=e654]: That is, this is an intentional false negative, deemed an acceptable break in correctness for security and performance.
                - heading "maxExtglobRecursion" [level=3] [ref=e655]
                - paragraph [ref=e656]:
                  - text: Max depth to traverse for nested extglobs like
                  - code [ref=e657]: "*(a|b|c)"
                - paragraph [ref=e658]:
                  - text: Default is 2, which is quite low, but any higher value swiftly results in punishing performance impacts. Note that this is
                  - emphasis [ref=e659]: not
                  - text: relevant when the globstar types can be safely coalesced into a single set.
                - paragraph [ref=e660]:
                  - text: For example,
                  - code [ref=e661]: "*(a|@(b|c)|d)"
                  - text: would be flattened into
                  - code [ref=e662]: "*(a|b|c|d)"
                  - text: . Thus, many common extglobs will retain good performance and never hit this limit, even if they are excessively deep and complicated.
                - paragraph [ref=e663]:
                  - text: If the limit is hit, then the extglob characters are simply not parsed, and the pattern effectively switches into
                  - code [ref=e664]: "noextglob: true"
                  - text: mode for the contents of that nested sub-pattern. This will typically
                  - emphasis [ref=e665]: not
                  - text: result in a match, but is considered a valid trade-off for security and performance.
                - heading "Comparisons to other fnmatch/glob implementations" [level=2] [ref=e666]
                - paragraph [ref=e667]: While strict compliance with the existing standards is a worthwhile goal, some discrepancies exist between minimatch and other implementations. Some are intentional, and some are unavoidable.
                - paragraph [ref=e668]:
                  - text: If the pattern starts with a
                  - code [ref=e669]: "!"
                  - text: character, then it is negated. Set the
                  - code [ref=e670]: nonegate
                  - text: flag to suppress this behavior, and treat leading
                  - code [ref=e671]: "!"
                  - text: characters normally. This is perhaps relevant if you wish to start the pattern with a negative extglob pattern like
                  - code [ref=e672]: "!(a|B)"
                  - text: . Multiple
                  - code [ref=e673]: "!"
                  - text: characters at the start of a pattern will negate the pattern multiple times.
                - paragraph [ref=e674]:
                  - text: If a pattern starts with
                  - code [ref=e675]: "#"
                  - text: ", then it is treated as a comment, and will not match anything. Use"
                  - code [ref=e676]: \#
                  - text: to match a literal
                  - code [ref=e677]: "#"
                  - text: at the start of a line, or set the
                  - code [ref=e678]: nocomment
                  - text: flag to suppress this behavior.
                - paragraph [ref=e679]:
                  - text: The double-star character
                  - code [ref=e680]: "**"
                  - text: is supported by default, unless the
                  - code [ref=e681]: noglobstar
                  - text: flag is set. This is supported in the manner of bsdglob and bash 4.1, where
                  - code [ref=e682]: "**"
                  - text: only has special significance if it is the only thing in a path part. That is,
                  - code [ref=e683]: a/**/b
                  - text: will match
                  - code [ref=e684]: a/x/y/b
                  - text: ", but"
                  - code [ref=e685]: a/**b
                  - text: will not.
                - paragraph [ref=e686]:
                  - text: If an escaped pattern has no matches, and the
                  - code [ref=e687]: nonull
                  - text: flag is set, then minimatch.match returns the pattern as-provided, rather than interpreting the character escapes. For example,
                  - code [ref=e688]: minimatch.match([], "\\*a\\?")
                  - text: will return
                  - code [ref=e689]: "\"\\\\*a\\\\?\""
                  - text: rather than
                  - code [ref=e690]: "\"*a?\""
                  - text: . This is akin to setting the
                  - code [ref=e691]: nullglob
                  - text: option in bash, except that it does not resolve escaped pattern characters.
                - paragraph [ref=e692]:
                  - text: If brace expansion is not disabled, then it is performed before any other interpretation of the glob pattern. Thus, a pattern like
                  - code [ref=e693]: "+(a|{b),c)}"
                  - text: ", which would not be valid in bash or zsh, is expanded"
                  - strong [ref=e694]: first
                  - text: into the set of
                  - code [ref=e695]: +(a|b)
                  - text: and
                  - code [ref=e696]: +(a|c)
                  - text: ", and those patterns are checked for validity. Since those two are valid, matching proceeds."
                - paragraph [ref=e697]:
                  - text: Negated extglob patterns are handled as closely as possible to Bash semantics, but there are some cases with negative extglobs which are exceedingly difficult to express in a JavaScript regular expression. In particular the negated pattern
                  - code [ref=e698]: <start>!(<pattern>*|)*
                  - text: will in bash match anything that does not start with
                  - code [ref=e699]: <start><pattern>
                  - text: . However,
                  - code [ref=e700]: <start>!(<pattern>*)*
                  - emphasis [ref=e701]: will
                  - text: match paths starting with
                  - code [ref=e702]: <start><pattern>
                  - text: ", because the empty string can match against the negated portion. In this library,"
                  - code [ref=e703]: <start>!(<pattern>*|)*
                  - text: will
                  - emphasis [ref=e704]: not
                  - text: match any pattern starting with
                  - code [ref=e705]: <start>
                  - text: ", due to a difference in precisely which patterns are considered \"greedy\" in Regular Expressions vs bash path expansion. This may be fixable, but not without incurring some complexity and performance costs, and the trade-off seems to not be worth pursuing."
                - paragraph [ref=e706]:
                  - text: Note that
                  - code [ref=e707]: fnmatch(3)
                  - text: in libc is an extremely naive string comparison matcher, which does not do anything special for slashes. This library is designed to be used in glob searching and file walkers, and so it does do special things with
                  - code [ref=e708]: /
                  - text: . Thus,
                  - code [ref=e709]: foo*
                  - text: will not match
                  - code [ref=e710]: foo/bar
                  - text: in this library, even though it would in
                  - code [ref=e711]: fnmatch(3)
                  - text: .
