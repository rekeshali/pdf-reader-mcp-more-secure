                  - text: . We read every file into pngjs, output it in standard 8bit colour, synchronously and asynchronously, then compare the original with the newly saved images.
                - paragraph [ref=e428]:
                  - text: To run the tests, fetch the repo (tests are not distributed via npm) and install with
                  - code [ref=e429]: npm i
                  - text: ", run"
                  - code [ref=e430]: npm test
                  - text: .
                - paragraph [ref=e431]: The only thing not converted is gamma correction - this is because multiple vendors will do gamma correction differently, so the tests will have different results on different browsers.
