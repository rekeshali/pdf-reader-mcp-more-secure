                      - code [ref=e710]: node_modules
                      - text: "\"."
                    - paragraph [ref=e711]:
                      - text: In order to support this, the
                      - code [ref=e712]: Ignore
                      - text: implementation must support an
                      - code [ref=e713]: "add(pattern: string)"
                      - text: method. If using the default
                      - code [ref=e714]: Ignore
                      - text: class, then this is fine, but if this is set to
                      - code [ref=e715]: "false"
                      - text: ", and a custom"
                      - code [ref=e716]: Ignore
                      - text: is provided that does not have an
                      - code [ref=e717]: add()
                      - text: method, then it will throw an error.
                    - paragraph [ref=e718]: "For example:"
                    - code [ref=e720]: "const results = await glob( [ // likely to match first, since it's just a stat 'a/b/c/d/e/f', // this pattern is more complicated! It must to various readdir() // calls and test the results against a regular expression, and that // is certainly going to take a little bit longer. // // So, later on, it encounters a match at 'a/b/c/d/e', but it's too // late to ignore a/b/c/d/e/f, because it's already been emitted. 'a/[bdf]/?/[a-z]/*', ], { includeChildMatches: false }, )"
                    - paragraph [ref=e721]:
                      - text: It's best to only set this to
                      - code [ref=e722]: "false"
                      - text: if you can be reasonably sure that no components of the pattern will potentially match one another's file system descendants, or if the occasional included child entry will not cause problems.
                - blockquote [ref=e723]:
                  - paragraph [ref=e724]:
                    - text: "[!NOTE] It"
                    - emphasis [ref=e725]: only
                    - text: ignores matches that would be a descendant of a previous match, and only if that descendant is matched
                    - emphasis [ref=e726]: after
                    - text: the ancestor is encountered. Since the file system walk happens in indeterminate order, it's possible that a match will already be added before its ancestor, if multiple or braced patterns are used.
                - list [ref=e727]:
                  - listitem [ref=e728]:
                    - code [ref=e729]: braceExpandMax
                    - text: number, defaults to
                    - code [ref=e730]: 10_000
                    - text: . This is the maximum number of
                    - code [ref=e731]: "{x,y,...}"
                    - text: patterns to expand. It is very unlikely that you'll need more than this, and setting it higher exposes the system to out-of-memory errors.
                - heading "Glob Primer" [level=2] [ref=e732]
                - paragraph [ref=e733]:
                  - text: Much more information about glob pattern expansion can be found by running
                  - code [ref=e734]: man bash
                  - text: and searching for
                  - code [ref=e735]: Pattern Matching
                  - text: .
                - paragraph [ref=e736]:
                  - text: "\"Globs\" are the patterns you type when you do stuff like"
                  - code [ref=e737]: ls *.js
                  - text: on the command line, or put
                  - code [ref=e738]: build/*
                  - text: in a
                  - code [ref=e739]: .gitignore
                  - text: file.
                - paragraph [ref=e740]:
                  - text: Before parsing the path part patterns, braced sections are expanded into a set. Braced sections start with
                  - code [ref=e741]: "{"
                  - text: and end with
                  - code [ref=e742]: "}"
                  - text: ", with 2 or more comma-delimited sections within. Braced sections may contain slash characters, so"
                  - code [ref=e743]: "a{/b/c,bcd}"
                  - text: would expand into
                  - code [ref=e744]: a/b/c
                  - text: and
                  - code [ref=e745]: abcd
                  - text: .
                - paragraph [ref=e746]:
                  - text: The following characters have special magic meaning when used in a path portion. With the exception of
                  - code [ref=e747]: "**"
                  - text: ", none of these match path separators (ie,"
                  - code [ref=e748]: /
                  - text: on all platforms, and
                  - code [ref=e749]: \
                  - text: on Windows).
                - list [ref=e750]:
                  - listitem [ref=e751]:
                    - code [ref=e752]: "*"
                    - text: Matches 0 or more characters in a single path portion. When alone in a path portion, it must match at least 1 character. If
                    - code [ref=e753]: dot:true
                    - text: is not specified, then
                    - code [ref=e754]: "*"
                    - text: will not match against a
                    - code [ref=e755]: .
                    - text: character at the start of a path portion.
                  - listitem [ref=e756]:
                    - code [ref=e757]: "?"
                    - text: Matches 1 character. If
                    - code [ref=e758]: dot:true
                    - text: is not specified, then
                    - code [ref=e759]: "?"
                    - text: will not match against a
                    - code [ref=e760]: .
                    - text: character at the start of a path portion.
                  - listitem [ref=e761]:
                    - code [ref=e762]: "[...]"
                    - text: Matches a range of characters, similar to a RegExp range. If the first character of the range is
                    - code [ref=e763]: "!"
                    - text: or
                    - code [ref=e764]: ^
                    - text: then it matches any character not in the range. If the first character is
                    - code [ref=e765]: "]"
                    - text: ", then it will be considered the same as"
                    - code [ref=e766]: \]
                    - text: ", rather than the end of the character class."
                  - listitem [ref=e767]:
                    - code [ref=e768]: "!(pattern|pattern|pattern)"
                    - text: Matches anything that does not match any of the patterns provided. May
                    - emphasis [ref=e769]: not
                    - text: contain
                    - code [ref=e770]: /
                    - text: characters. Similar to
                    - code [ref=e771]: "*"
                    - text: ", if alone in a path portion, then the path portion must have at least one character."
                  - listitem [ref=e772]:
                    - code [ref=e773]: "?(pattern|pattern|pattern)"
                    - text: Matches zero or one occurrence of the patterns provided. May
                    - emphasis [ref=e774]: not
                    - text: contain
                    - code [ref=e775]: /
                    - text: characters.
                  - listitem [ref=e776]:
                    - code [ref=e777]: +(pattern|pattern|pattern)
                    - text: Matches one or more occurrences of the patterns provided. May
                    - emphasis [ref=e778]: not
                    - text: contain
                    - code [ref=e779]: /
                    - text: characters.
                  - listitem [ref=e780]:
                    - code [ref=e781]: "*(a|b|c)"
                    - text: Matches zero or more occurrences of the patterns provided. May
                    - emphasis [ref=e782]: not
                    - text: contain
                    - code [ref=e783]: /
                    - text: characters.
                  - listitem [ref=e784]:
                    - code [ref=e785]: "@(pattern|pat*|pat?erN)"
                    - text: Matches exactly one of the patterns provided. May
                    - emphasis [ref=e786]: not
                    - text: contain
                    - code [ref=e787]: /
                    - text: characters.
                  - listitem [ref=e788]:
                    - code [ref=e789]: "**"
                    - text: If a "globstar" is alone in a path portion, then it matches zero or more directories and subdirectories searching for matches. It does not crawl symlinked directories, unless
                    - code [ref=e790]: "{follow:true}"
                    - text: is passed in the options object. A pattern like
                    - code [ref=e791]: a/b/**
                    - text: will only match
                    - code [ref=e792]: a/b
                    - text: if it is a directory. Follows 1 symbolic link if not the first item in the pattern, or 0 if it is the first item, unless
                    - code [ref=e793]: follow:true
                    - text: is set, in which case it follows all symbolic links.
                - paragraph [ref=e794]:
                  - code [ref=e795]: "[:class:]"
                  - text: patterns are supported by this implementation, but
                  - code [ref=e796]: "[=c=]"
                  - text: and
                  - code [ref=e797]: "[.symbol.]"
                  - text: style class patterns are not.
                - heading "Dots" [level=3] [ref=e798]
                - paragraph [ref=e799]:
                  - text: If a file or directory path portion has a
                  - code [ref=e800]: .
                  - text: as the first character, then it will not match any glob pattern unless that pattern's corresponding path part also has a
                  - code [ref=e801]: .
                  - text: as its first character.
                - paragraph [ref=e802]:
                  - text: For example, the pattern
                  - code [ref=e803]: a/.*/c
                  - text: would match the file at
                  - code [ref=e804]: a/.b/c
                  - text: . However the pattern
                  - code [ref=e805]: a/*/c
                  - text: would not, because
                  - code [ref=e806]: "*"
                  - text: does not start with a dot character.
                - paragraph [ref=e807]:
                  - text: You can make glob treat dots as normal characters by setting
                  - code [ref=e808]: dot:true
                  - text: in the options.
                - heading "Basename Matching" [level=3] [ref=e809]
                - paragraph [ref=e810]:
                  - text: If you set
                  - code [ref=e811]: matchBase:true
                  - text: in the options, and the pattern has no slashes in it, then it will seek for any file anywhere in the tree with a matching basename. For example,
                  - code [ref=e812]: "*.js"
                  - text: would match
                  - code [ref=e813]: test/simple/basic.js
                  - text: .
                - heading "Empty Sets" [level=3] [ref=e814]
                - paragraph [ref=e815]: "If no matching files are found, then an empty array is returned. This differs from the shell, where the pattern itself is returned. For example:"
                - code [ref=e817]: $ echo a*s*d*f a*s*d*f
                - heading "Comparisons to other fnmatch/glob implementations" [level=2] [ref=e818]
                - paragraph [ref=e819]: While strict compliance with the existing standards is a worthwhile goal, some discrepancies exist between node-glob and other implementations, and are intentional.
                - paragraph [ref=e820]:
                  - text: The double-star character
                  - code [ref=e821]: "**"
                  - text: is supported by default, unless the
                  - code [ref=e822]: noglobstar
                  - text: flag is set. This is supported in the manner of bsdglob and bash 5, where
                  - code [ref=e823]: "**"
                  - text: only has special significance if it is the only thing in a path part. That is,
                  - code [ref=e824]: a/**/b
                  - text: will match
                  - code [ref=e825]: a/x/y/b
                  - text: ", but"
                  - code [ref=e826]: a/**b
                  - text: will not.
                - blockquote [ref=e827]:
                  - paragraph [ref=e828]:
                    - text: "[!NOTE] Symlinked directories are not traversed as part of a"
                    - code [ref=e829]: "**"
                    - text: ", though their contents may match against subsequent portions of the pattern. This prevents infinite loops and duplicates and the like. You can force glob to traverse symlinks with"
                    - code [ref=e830]: "**"
                    - text: by setting
                    - code [ref=e831]: "{follow:true}"
                    - text: in the options.
                - paragraph [ref=e832]:
                  - text: There is no equivalent of the
                  - code [ref=e833]: nonull
                  - text: option. A pattern that does not find any matches simply resolves to nothing. (An empty array, immediately ended stream, etc.)
                - paragraph [ref=e834]:
                  - text: If brace expansion is not disabled, then it is performed before any other interpretation of the glob pattern. Thus, a pattern like
                  - code [ref=e835]: "+(a|{b),c)}"
                  - text: ", which would not be valid in bash or zsh, is expanded"
                  - strong [ref=e836]: first
                  - text: into the set of
                  - code [ref=e837]: +(a|b)
                  - text: and
                  - code [ref=e838]: +(a|c)
                  - text: ", and those patterns are checked for validity. Since those two are valid, matching proceeds."
                - paragraph [ref=e839]:
                  - text: The character class patterns
                  - code [ref=e840]: "[:class:]"
                  - text: (POSIX standard named classes) style class patterns are supported and Unicode-aware, but
                  - code [ref=e841]: "[=c=]"
                  - text: (locale-specific character collation weight), and
                  - code [ref=e842]: "[.symbol.]"
                  - text: (collating symbol), are not.
                - heading "Repeated Slashes" [level=3] [ref=e843]
                - paragraph [ref=e844]:
                  - text: Unlike Bash and zsh, repeated
                  - code [ref=e845]: /
                  - text: are always coalesced into a single path separator.
                - heading "Comments and Negation" [level=3] [ref=e846]
                - paragraph [ref=e847]:
                  - text: Previously, this module let you mark a pattern as a "comment" if it started with a
                  - code [ref=e848]: "#"
                  - text: character, or a "negated" pattern if it started with a
                  - code [ref=e849]: "!"
                  - text: character.
                - paragraph [ref=e850]: These options were deprecated in version 5, and removed in version 6.
                - paragraph [ref=e851]:
                  - text: To specify things that should not match, use the
                  - code [ref=e852]: ignore
                  - text: option.
                - heading "Windows" [level=2] [ref=e853]
                - paragraph [ref=e854]:
                  - strong [ref=e855]: Please only use forward-slashes in glob expressions.
                - paragraph [ref=e856]:
                  - text: Though Windows uses either
                  - code [ref=e857]: /
                  - text: or
                  - code [ref=e858]: \
                  - text: as its path separator, only
                  - code [ref=e859]: /
                  - text: characters are used by this glob implementation. You must use forward-slashes
                  - strong [ref=e860]: only
                  - text: in glob expressions. Back-slashes will always be interpreted as escape characters, not path separators.
                - paragraph [ref=e861]:
                  - text: Results from absolute patterns such as
                  - code [ref=e862]: /foo/*
                  - text: are mounted onto the root setting using
                  - code [ref=e863]: path.join
                  - text: . On Windows, this will by default result in
                  - code [ref=e864]: /foo/*
                  - text: matching
                  - code [ref=e865]: C:\foo\bar.txt
                  - text: .
                - paragraph [ref=e866]:
                  - text: To automatically coerce all
                  - code [ref=e867]: \
                  - text: characters to
                  - code [ref=e868]: /
                  - text: in pattern strings,
                  - strong [ref=e869]: thus making it impossible to escape literal glob characters
                  - text: ", you may set the"
                  - code [ref=e870]: windowsPathsNoEscape
                  - text: option to
                  - code [ref=e871]: "true"
                  - text: .
                - heading "Windows, CWDs, Drive Letters, and UNC Paths" [level=3] [ref=e872]
                - paragraph [ref=e873]:
                  - text: On POSIX systems, when a pattern starts with
                  - code [ref=e874]: /
                  - text: ", any"
                  - code [ref=e875]: cwd
                  - text: option is ignored, and the traversal starts at
                  - code [ref=e876]: /
                  - text: ", plus any non-magic path portions specified in the pattern."
                - paragraph [ref=e877]: On Windows systems, the behavior is similar, but the concept of an "absolute path" is somewhat more involved.
                - heading "UNC Paths" [level=4] [ref=e878]
                - paragraph [ref=e879]:
                  - text: "A UNC path may be used as the start of a pattern on Windows platforms. For example, a pattern like:"
                  - code [ref=e880]: //?/x:/*
                  - text: will return all file entries in the root of the
                  - code [ref=e881]: "x:"
                  - text: drive. A pattern like
                  - code [ref=e882]: //ComputerName/Share/*
                  - text: will return all files in the associated share.
                - paragraph [ref=e883]: UNC path roots are always compared case insensitively.
                - heading "Drive Letters" [level=4] [ref=e884]
                - paragraph [ref=e885]:
                  - text: A pattern starting with a drive letter, like
                  - code [ref=e886]: c:/*
                  - text: ", will search in that drive, regardless of any"
                  - code [ref=e887]: cwd
                  - text: option provided.
                - paragraph [ref=e888]:
                  - text: If the pattern starts with
                  - code [ref=e889]: /
                  - text: ", and is not a UNC path, and there is an explicit"
                  - code [ref=e890]: cwd
                  - text: option set with a drive letter, then the drive letter in the
                  - code [ref=e891]: cwd
                  - text: is used as the root of the directory traversal.
                - paragraph [ref=e892]:
                  - text: For example,
                  - code [ref=e893]: "glob('/tmp', { cwd: 'c:/any/thing' })"
                  - text: will return
                  - code [ref=e894]: "['c:/tmp']"
                  - text: as the result.
                - paragraph [ref=e895]:
                  - text: If an explicit
                  - code [ref=e896]: cwd
                  - text: option is not provided, and the pattern starts with
                  - code [ref=e897]: /
                  - text: ", then the traversal will run on the root of the drive provided as the"
                  - code [ref=e898]: cwd
                  - text: option. (That is, it is the result of
                  - code [ref=e899]: path.resolve('/')
                  - text: .)
                - heading "Race Conditions" [level=2] [ref=e900]
                - paragraph [ref=e901]: Glob searching, by its very nature, is susceptible to race conditions, since it relies on directory walking.
                - paragraph [ref=e902]: As a result, it is possible that a file that exists when glob looks for it may have been deleted or modified by the time it returns the result.
                - paragraph [ref=e903]: By design, this implementation caches all readdir calls that it makes, in order to cut down on system overhead. However, this also makes it even more susceptible to races, especially if the cache object is reused between glob calls.
                - paragraph [ref=e904]: Users are thus advised not to use a glob result as a guarantee of filesystem state in the face of rapid changes. For the vast majority of operations, this is never a problem.
                - heading "See Also:" [level=3] [ref=e905]
                - list [ref=e906]:
                  - listitem [ref=e907]:
                    - code [ref=e908]: man sh
                  - listitem [ref=e909]:
                    - code [ref=e910]: man bash
                    - link "Pattern Matching" [ref=e911] [cursor=pointer]:
                      - /url: https://www.gnu.org/software/bash/manual/html_node/Pattern-Matching.html
                  - listitem [ref=e912]:
                    - code [ref=e913]: man 3 fnmatch
                  - listitem [ref=e914]:
                    - code [ref=e915]: man 5 gitignore
                  - listitem [ref=e916]:
                    - link "minimatch documentation" [ref=e917] [cursor=pointer]:
                      - /url: https://github.com/isaacs/minimatch
                - heading "Glob Logo" [level=2] [ref=e918]
                - paragraph [ref=e919]:
                  - text: Glob's logo was created by
                  - link "Tanya Brassie" [ref=e920] [cursor=pointer]:
                    - /url: http://tanyabrassie.com/
                  - text: . Logo files can be found
                  - link "here" [ref=e921] [cursor=pointer]:
                    - /url: https://github.com/isaacs/node-glob/tree/master/logo
                  - text: .
                - paragraph [ref=e922]:
                  - text: The logo is licensed under a
                  - link "Creative Commons Attribution-ShareAlike 4.0 International License" [ref=e923] [cursor=pointer]:
                    - /url: https://creativecommons.org/licenses/by-sa/4.0/
                  - text: .
                - heading "Contributing" [level=2] [ref=e924]
                - paragraph [ref=e925]: Any change to behavior (including bugfixes) must come with a test.
                - paragraph [ref=e926]: Patches that fail tests or reduce performance will be rejected.
                - code [ref=e928]: "# to run tests npm test # to re-generate test fixtures npm run test-regen # run the benchmarks npm run bench # to profile javascript npm run prof"
                - heading "Comparison to Other JavaScript Glob Implementations" [level=2] [ref=e929]
                - paragraph [ref=e930]:
                  - strong [ref=e931]: tl;dr
                - list [ref=e932]:
                  - listitem [ref=e933]:
                    - text: If you want glob matching that is as faithful as possible to Bash pattern expansion semantics, and as fast as possible within that constraint,
                    - emphasis [ref=e934]: use this module
                    - text: .
                  - listitem [ref=e935]:
                    - text: If you are reasonably sure that the patterns you will encounter are relatively simple, and want the absolutely fastest glob matcher out there,
                    - emphasis [ref=e936]:
                      - text: use
                      - link "fast-glob" [ref=e937] [cursor=pointer]:
                        - /url: http://npm.im/fast-glob
                    - text: .
                  - listitem [ref=e938]:
                    - text: If you are reasonably sure that the patterns you will encounter are relatively simple, and want the convenience of automatically respecting
                    - code [ref=e939]: .gitignore
                    - text: files,
                    - emphasis [ref=e940]:
                      - text: use
                      - link "globby" [ref=e941] [cursor=pointer]:
                        - /url: http://npm.im/globby
                    - text: .
                - paragraph [ref=e942]: There are some other glob matcher libraries on npm, but these three are (in my opinion, as of 2023) the best.
                - separator [ref=e943]
                - paragraph [ref=e944]:
                  - strong [ref=e945]: full explanation
                - paragraph [ref=e946]:
                  - text: Every library reflects a set of opinions and priorities in the trade-offs it makes. Other than this library, I can personally recommend both
                  - link "globby" [ref=e947] [cursor=pointer]:
                    - /url: http://npm.im/globby
                  - text: and
                  - link "fast-glob" [ref=e948] [cursor=pointer]:
                    - /url: http://npm.im/fast-glob
                  - text: ", though they differ in their benefits and drawbacks."
                - paragraph [ref=e949]: Both have very nice APIs and are reasonably fast.
                - paragraph [ref=e950]:
                  - code [ref=e951]: fast-glob
                  - text: is, as far as I am aware, the fastest glob implementation in JavaScript today. However, there are many cases where the choices that
                  - code [ref=e952]: fast-glob
                  - text: makes in pursuit of speed mean that its results differ from the results returned by Bash and other sh-like shells, which may be surprising.
                - paragraph [ref=e953]:
                  - text: In my testing,
                  - code [ref=e954]: fast-glob
                  - text: is around 10-20% faster than this module when walking over 200k files nested 4 directories deep
                  - link "1" [ref=e955] [cursor=pointer]:
                    - /url: /npm/package/glob#fn-webscale
                  - text: ". However, there are some inconsistencies with Bash matching behavior that this module does not suffer from:"
                - list [ref=e956]:
                  - listitem [ref=e957]:
                    - code [ref=e958]: "**"
                    - text: only matches files, not directories
                  - listitem [ref=e959]:
                    - code [ref=e960]: ..
                    - text: path portions are not handled unless they appear at the start of the pattern
                  - listitem [ref=e961]:
                    - code [ref=e962]: ./!(<pattern>)
                    - text: will not match any files that
                    - emphasis [ref=e963]: start
                    - text: with
                    - code [ref=e964]: <pattern>
                    - text: ", even if they do not match"
                    - code [ref=e965]: <pattern>
                    - text: . For example,
                    - code [ref=e966]: "!(9).txt"
                    - text: will not match
                    - code [ref=e967]: 9999.txt
                    - text: .
                  - listitem [ref=e968]: Some brace patterns in the middle of a pattern will result in failing to find certain matches.
                  - listitem [ref=e969]:
                    - text: Extglob patterns are allowed to contain
                    - code [ref=e970]: /
                    - text: characters.
                - paragraph [ref=e971]: Globby exhibits all of the same pattern semantics as fast-glob, (as it is a wrapper around fast-glob) and is slightly slower than node-glob (by about 10-20% in the benchmark test set, or in other words, anywhere from 20-50% slower than fast-glob). However, it adds some API conveniences that may be worth the costs.
                - list [ref=e972]:
                  - listitem [ref=e973]:
                    - text: Support for
                    - code [ref=e974]: .gitignore
                    - text: and other ignore files.
                  - listitem [ref=e975]:
                    - text: Support for negated globs (ie, patterns starting with
                    - code [ref=e976]: "!"
                    - text: rather than using a separate
                    - code [ref=e977]: ignore
                    - text: option).
                - paragraph [ref=e978]: The priority of this module is "correctness" in the sense of performing a glob pattern expansion as faithfully as possible to the behavior of Bash and other sh-like shells, with as much speed as possible.
                - blockquote [ref=e979]:
                  - paragraph [ref=e980]:
                    - text: "[!NOTE] Prior versions of"
                    - code [ref=e981]: node-glob
                    - text: are
                    - emphasis [ref=e982]: not
                    - text: on this list. Former versions of this module are far too slow for any cases where performance matters at all, and were designed with APIs that are extremely dated by current JavaScript standards.
                - separator [ref=e983]
                - paragraph [ref=e984]:
                  - text: "[1]: In the cases where this module returns results and"
                  - code [ref=e985]: fast-glob
                  - text: doesn't, it's even faster, of course.
                - paragraph [ref=e986]:
                  - img "lumpy space princess saying 'oh my GLOB'" [ref=e987]
                - heading "Benchmark Results" [level=3] [ref=e988]
